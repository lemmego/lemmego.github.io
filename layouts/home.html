{{ define "main" }}

<div style="background: linear-gradient(180deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%); padding: 4rem 0;">
  <div class="hx:max-w-[90rem] hx:mx-auto hx:px-6 hx:text-center">
    <span class="hx:inline-block hx:rounded-full hx:bg-white/10 hx:px-4 hx:py-1.5 hx:text-sm hx:font-medium hx:mb-4 hx:border hx:border-white/20" style="color: #93c5fd;">v0.1.41</span>
    <h1 class="hx:text-4xl hx:sm:text-5xl hx:font-bold hx:tracking-tight hx:mb-4" style="color: #ffffff;">The Go framework that ships batteries included</h1>
    <p class="hx:text-xl hx:mb-8" style="color: #93c5fd;">Lemmego combines the productivity of modern web frameworks with the type safety and performance of Go.</p>
    <div class="hx:flex hx:justify-center hx:gap-4">
      <a href="/docs/prologue" class="hx:inline-flex hx:items-center hx:rounded-full hx:px-6 hx:py-2.5 hx:text-sm hx:font-semibold hx:shadow-lg hx:transition" style="background-color: #ffffff; color: #0f172a;">Get Started →</a>
      <a href="https://github.com/lemmego/cli" class="hx:inline-flex hx:items-center hx:rounded-full hx:px-6 hx:py-2.5 hx:text-sm hx:font-semibold hx:border hx:transition" style="border-color: rgba(255,255,255,0.3); color: #ffffff;">GitHub</a>
    </div>
  </div>
</div>

<div class='hx:mx-auto hx:flex hextra-max-page-width'>
  {{ partial "sidebar.html" (dict "context" . "disableSidebar" true) }}
  <article class="hx:w-full hx:break-words hx:flex hx:min-h-[calc(100vh-var(--navbar-height))] hx:min-w-0 hx:justify-center hx:pb-8">
    <main id="content" class="hx:w-full hx:min-w-0 hextra-max-content-width hx:px-6 hx:pt-8 hx:md:px-12">
      <div class="content">
        {{ .Content }}
      </div>
    </main>
  </article>
</div>

{{ end }}
