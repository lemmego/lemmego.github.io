{{ define "main" }}

<div class="hero">
  <div class="hx:max-w-[90rem] hx:mx-auto hx:px-6 hx:text-center">
    <span class="hx:inline-block hx:rounded-full hx:bg-red-200 hx:dark:bg-red-900 hx:px-4 hx:py-1.5 hx:text-sm hx:font-medium hx:mb-4 hx:border hx:border-red-300 hx:dark:border-red-700 hx:text-red-800 hx:dark:text-red-200">v0.1.41</span>
    <h1 class="hx:text-4xl hx:sm:text-5xl hx:font-bold hx:tracking-tight hx:mb-4 hx:text-red-900" style="color: #b91c1c;">The Go framework that ships batteries included</h1>
    <p class="hx:text-xl hx:mb-8 hx:text-red-800 hx:dark:text-red-200">Lemmego combines the productivity of modern web frameworks with the type safety and performance of Go.</p>
    <div class="hx:flex hx:justify-center hx:gap-4">
      <a href="/docs/prologue" class="btn-primary">Get Started →</a>
      <a href="https://github.com/lemmego/cli" class="btn-outline">GitHub</a>
    </div>
  </div>
</div>

<div class='hx:mx-auto hx:flex hextra-max-page-width'>
  {{ partial "sidebar.html" (dict "context" . "disableSidebar" true) }}
  <article class="hx:w-full hx:break-words hx:flex hx:min-h-[calc(100vh-var(--navbar-height))] hx:min-w-0 hx:justify-center hx:pb-8">
    <main id="content" class="hx:w-full hx:min-w-0 hextra-max-content-width hx:px-6 hx:pt-8 hx:md:px-12">
      <div class="content">
        {{ .Content }}
      </div>
    </main>
  </article>
</div>

{{ end }}
