# Hugo configuration file
title: Lemmego

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Docs
      pageRef: /docs/prologue
      weight: 1
    # - name: About
    #   pageRef: /about
    #   weight: 2
    - name: Repo ↗
      url: "https://github.com/lemmego"
      weight: 2
    - name: Search
      weight: 3
      params:
        type: search
    - name: GitHub
      weight: 4
      url: "https://github.com/lemmego"
      params:
        icon: github
    - name: Discord
      weight: 5
      url: "https://discord.gg/JcJUt3qwE"
      params:
        icon: discord


params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: false
    displayPoweredBy: true

  editURL:
    enable: true
    base: "https://github.com/lemmego/lemmego.github.io/edit/main/content"
